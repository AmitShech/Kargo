{{- $builtInComponentDefaults := include "generic-kargo-pipeline.componentDefaults" . | fromYaml -}}
{{- $componentDefaults := mergeOverwrite (deepCopy $builtInComponentDefaults) (default dict .Values.sources.componentDefaults) -}}
{{- range .Values.sources.components }}
{{- $component := mergeOverwrite (deepCopy $componentDefaults) . -}}
{{- if and $component.enabled $component.git.repository.username $component.git.repository.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "generic-kargo-pipeline.componentDevGitSecretName" $component | quote }}
  labels:
    {{- include "generic-kargo-pipeline.labels" $ | nindent 4 }}
    {{- include "generic-kargo-pipeline.applicationLabels" $ | nindent 4 }}
    kargo.akuity.io/cred-type: git
type: Opaque
stringData:
  repoURL: {{ $component.git.repository.url | quote }}
  username: {{ $component.git.repository.username | quote }}
  password: {{ $component.git.repository.password | quote }}
{{- end }}
{{- end }}

{{- if and .Values.developersGit.repository.username .Values.developersGit.repository.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "generic-kargo-pipeline.developersGitSecretName" . | quote }}
  labels:
    {{- include "generic-kargo-pipeline.labels" . | nindent 4 }}
    {{- include "generic-kargo-pipeline.applicationLabels" . | nindent 4 }}
    kargo.akuity.io/cred-type: git
type: Opaque
stringData:
  repoURL: {{ .Values.developersGit.repository.url | quote }}
  username: {{ .Values.developersGit.repository.username | quote }}
  password: {{ .Values.developersGit.repository.password | quote }}
{{- end }}

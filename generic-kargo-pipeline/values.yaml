# Default values for the generic Kargo promotion pipeline.
# Keep application-specific values in an override file instead of editing templates.

global:
  labels: {}
  annotations: {}

artifact:
  components:
    # Component name is reserved for future stage logic that maps Freight images into config updates.
    - name: my-app
      image:
        repository: registry.example.com/team/my-app
        selectionStrategy: NewestBuild
        # Optional. Set to a regular expression to restrict eligible tags.
        allowedTags: ""
        # Optional. Used only when the selected image strategy requires a SemVer constraint.
        semverConstraint: ""
        discoveryLimit: 20

chartGit:
  repository:
    url: https://gitlab.example.com/team/my-app-deployment.git
    username: ""
    password: ""
  branches:
    source: develop
    production: master
    # Future promotion logic will populate these values from the current Freight.
    releaseTemplate: "release/{{ .ImageTag }}/{{ .Commit }}"
  paths:
    valuesFile:
      base: values.yaml
      environment: "values/{{ .Environment }}.yaml"

developersGit:
  repository:
    url: https://gitlab.example.com/team/my-app.git
    username: ""
    password: ""
  configurationPathFile: src/main/resources/values.yaml

environments:
  dev:
    name: dev
    namespace: my-app-dev
    argocd:
      applicationName: my-app-dev
      namespace: argocd
    autoPromotionEnabled: true
    verification:
      enabled: true
  integration:
    name: integration
    namespace: my-app-integration
    argocd:
      applicationName: my-app-integration
      namespace: argocd
    autoPromotionEnabled: true
    verification:
      enabled: true
  preProduction:
    name: pre-production
    autoPromotionEnabled: true
  production:
    name: production
    namespace: my-app-production
    argocd:
      applicationName: my-app-production
      namespace: argocd
    autoPromotionEnabled: false
    verification:
      enabled: true

prepareRelease:
  autoPromotionEnabled: true

qa:
  enabled: true

integrationVerification:
  enabled: true

productionVerification:
  enabled: true

serviceNow:
  enabled: false
  credentialsSecret:
    name: my-app-servicenow-credentials
    usernameKey: username
    passwordKey: password

gitLab:
  mergeRequest:
    enabled: false
    credentialsSecret:
      name: my-app-gitlab-token
      tokenKey: token

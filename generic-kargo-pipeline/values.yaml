# Default values for the generic Kargo promotion pipeline.
# Keep application-specific values in an override file instead of editing templates.

global:
  labels: {}
  annotations: {}

application:
  name: my-app

warehouse:
  name: app-images
  interval: 10m
  freightCreationPolicy: Automatic

sources:
  components:
    - name: api
      enabled: true
      image:
        repository: registry.example.com/team/my-app-api
        selectionStrategy: NewestBuild
        # Optional. Set to a regular expression to restrict eligible tags.
        allowedTags: ""
        # Optional. Used only when the selected image strategy requires a SemVer constraint.
        semverConstraint: ""
        discoveryLimit: 20
      git:
        repository:
          url: https://gitlab.example.com/team/my-app-api.git
          username: ""
          password: ""
        configuration:
          path: src/main/resources/values.yaml
      valuesMapping:
        tagPath: "{{ .Values.application.name }}.components.{{ .name }}.image.tag"

    - name: worker
      enabled: true
      image:
        repository: registry.example.com/team/my-app-worker
        selectionStrategy: NewestBuild
        allowedTags: ""
        semverConstraint: ""
        discoveryLimit: 20
      git:
        repository:
          url: https://gitlab.example.com/team/my-app-worker.git
          username: ""
          password: ""
        configuration:
          path: src/main/resources/values.yaml
      valuesMapping:
        tagPath: "{{ .Values.application.name }}.components.{{ .name }}.image.tag"

  deploymentGit:
    repository:
      url: https://gitlab.example.com/team/my-app-deployment.git
      username: ""
      password: ""

    subscription:
      enabled: true
      branch: develop
      commitSelectionStrategy: NewestFromBranch
      discoveryLimit: 15
      includePaths:
        - values.yaml
        - values/**
      excludePaths:
        - kargo/**
        - release-metadata/**

    branches:
      source: develop
      production: master

    paths:
      valuesFiles:
        base: values.yaml
        environment: values/${{ vars.environment }}.yaml

pipeline:
  stages:
    prepareRelease:
      name: prepare-release
      autoPromotionEnabled: true
      releaseBranch: release/${{ imageFrom(vars.imageRepository).Tag }}

    dev:
      name: dev
      autoPromotionEnabled: true
      deployment:
        namespace: my-app-dev
        argocd:
          applicationName: my-app-dev
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-dev-qa
        timeout: 30m
        job:
          image:
            repository: registry.example.com/team/my-app-qa
            tag: latest

    integration:
      name: integration
      autoPromotionEnabled: true
      deployment:
        namespace: my-app-integration
        argocd:
          applicationName: my-app-integration
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-integration-verification
        timeout: 45m
        job:
          image:
            repository: registry.example.com/team/my-app-integration-tests
            tag: latest

    preProduction:
      name: pre-production
      autoPromotionEnabled: true

    production:
      name: production
      autoPromotionEnabled: false
      deployment:
        namespace: my-app-production
        argocd:
          applicationName: my-app-production
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-production-smoke
        timeout: 10m

integrations:
  serviceNow:
    enabled: false
    credentials:
      username: ""
      password: ""

  gitLab:
    mergeRequest:
      enabled: false
      credentials:
        token: ""

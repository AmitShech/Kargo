# Default values for the generic Kargo promotion pipeline.
# Keep application-specific values in an override file instead of editing templates.

global:
  labels: {}
  annotations: {}

warehouse:
  name: app-images
  interval: 10m
  freightCreationPolicy: Automatic

sources:
  # Optional. Set only the shared component defaults you want to override.
  componentDefaults: {}

  components:
    - name: main
      enabled: true
      image:
        artifactory: registry.example.com/team/my-app
        selectionStrategy: NewestBuild
        # Optional. Set to a regular expression to restrict eligible tags.
        allowedTags: ""
        # Optional. Used only when the selected image strategy requires a SemVer constraint.
        semverConstraint: ""
        strictSemvers: false
        discoveryLimit: 20

      git:
        repository:
          url: https://gitlab.example.com/team/my-app.git
          username: ""
          password: ""

      # The prepare-release Stage creates or updates this component's deployment file.
      releaseConfiguration:
        generationEnabled: true
        devConfigurationPath: src/main/resources/Main/dev-configuration.yaml
        deploymentOverlayPath: configurations/components/name/kargo/config.yaml
        outputPath: configurations/components/name/base/config.yaml

      valuesMapping:
        tagPath: image.tag

  deploymentGit:
    repository:
      url: https://gitlab.example.com/team/my-app-deployment.git
      username: ""
      password: ""

    branches:
      source: develop
      production: master

    subscription:
      enabled: true
      commitSelectionStrategy: NewestFromBranch
      discoveryLimit: 15
      includePaths:
        - values.yaml
        - values/**
      excludePaths:
        - kargo/**
        - release-metadata/**

    paths:
      valuesFiles:
        base: values.yaml
        environment: values/${{ vars.environment }}.yaml

pipeline:
  stages:
    prepareRelease:
      name: prepare-release
      autoPromotionEnabled: true
      releaseBranch: release/${{ ctx.targetFreight.name }}

    dev:
      name: dev
      autoPromotionEnabled: true
      deployment:
        namespace: my-app-dev
        argocd:
          applicationName: my-app-dev
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-dev-qa
        timeout: 30m

    integration:
      name: integration
      autoPromotionEnabled: true
      deployment:
        namespace: my-app-integration
        argocd:
          applicationName: my-app-integration
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-integration-verification
        timeout: 45m

    preProduction:
      name: pre-production
      autoPromotionEnabled: true

    production:
      name: production
      autoPromotionEnabled: false
      deployment:
        namespace: my-app-production
        argocd:
          applicationName: my-app-production
          namespace: argocd
      verification:
        enabled: true
        templateName: my-app-production-smoke
        timeout: 10m
